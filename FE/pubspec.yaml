name: bigstyle_app
description: "BigStyle - Thời trang bigsize tự tin, cao cấp"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.7
  supabase_flutter: ^2.8.3
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  carousel_slider: ^5.0.0
  intl: ^0.20.2
  image_picker: ^1.1.2
  uuid: ^4.5.1
  flutter_screenutil: ^5.9.3
  http: ^1.6.0
  google_sign_in: ^6.2.2
  google_maps_flutter: ^2.12.0
  geolocator: ^13.0.2
  flutter_polyline_points: ^2.1.0
  flutter_dotenv: ^5.2.1
  url_launcher: ^6.3.0
  share_plus: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
  fonts:
    - family: Cormorant
      fonts:
        - asset: assets/fonts/Cormorant-Variable.ttf
          weight: 400
        - asset: assets/fonts/Cormorant-Variable.ttf
          weight: 500
        - asset: assets/fonts/Cormorant-Variable.ttf
          weight: 600
        - asset: assets/fonts/Cormorant-Variable.ttf
          weight: 700
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Variable.ttf
          weight: 300
        - asset: assets/fonts/Montserrat-Variable.ttf
          weight: 400
        - asset: assets/fonts/Montserrat-Variable.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-Variable.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-Variable.ttf
          weight: 700
